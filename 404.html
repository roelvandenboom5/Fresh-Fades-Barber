<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#060606;--bg2:#0B0B0B;--tx:#F4EFE9;--txm:#8E8880;--txs:#555048;--gold:#BF9B4E;--gold-l:#D4B56A;--brs:rgba(191,155,78,.08);--fh:'Playfair Display',serif;--fb:'Manrope',sans-serif;--fm:'JetBrains Mono',monospace;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fb);}
a{color:inherit;text-decoration:none;}

.page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 20px;position:relative;overflow:hidden;}

/* Background decorative 404 */
.bg-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--fh);font-size:clamp(20rem,40vw,40rem);font-weight:700;color:rgba(191,155,78,.03);line-height:1;pointer-events:none;z-index:0;user-select:none;}

.content{position:relative;z-index:1;}
.logo{height:36px;margin:0 auto 40px;opacity:.8;}
.code{font-family:var(--fm);font-size:.7rem;color:var(--gold);letter-spacing:.3em;margin-bottom:16px;}
.title{font-family:var(--fh);font-size:clamp(2rem,5vw,3.5rem);font-weight:400;margin-bottom:16px;line-height:1.2;}
.title em{font-style:italic;color:var(--gold);}
.desc{font-size:.88rem;color:var(--txm);line-height:1.7;max-width:400px;margin:0 auto 40px;font-weight:300;}
.btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;font-family:var(--fb);font-size:.62rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;border:none;cursor:pointer;transition:all .3s;}
.btn-g{background:var(--gold);color:var(--bg);}.btn-g:hover{background:var(--gold-l);transform:translateY(-2px);}
.btn-o{background:transparent;color:var(--tx);border:1px solid var(--brs);}.btn-o:hover{border-color:var(--gold);color:var(--gold);}

/* Scissor animation */
.scissor{font-size:3rem;margin-bottom:24px;display:inline-block;animation:snip 2s ease-in-out infinite;}
@keyframes snip{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}75%{transform:rotate(-5deg)}}
