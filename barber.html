<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#060606;--bg2:#0B0B0B;--bg3:#121212;--bg4:#1B1B1B;--tx:#F4EFE9;--txm:#8E8880;--txs:#555048;--gold:#BF9B4E;--gl:#D4B56A;--gd:#8A7038;--br:rgba(191,155,78,.2);--brs:rgba(191,155,78,.08);--fh:'Playfair Display',serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;}
html{background:var(--bg);color:var(--tx);font-family:var(--fb);scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{overflow-x:hidden;}a{color:inherit;text-decoration:none;}img{max-width:100%;display:block;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(6,6,6,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--brs);}
.nl img{height:30px;opacity:.9;}.nk{display:flex;gap:28px;align-items:center;}
.nk a{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--txm);transition:color .25s;font-weight:500;}.nk a:hover{color:var(--gold);}
.nc{background:var(--gold)!important;color:var(--bg)!important;padding:9px 22px!important;font-weight:700!important;}
.mb{display:none;background:none;border:1px solid var(--brs);color:var(--tx);width:38px;height:38px;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;}
@media(max-width:960px){nav{padding:0 20px;}.nk{display:none;}.mb{display:flex;}}

.bp{max-width:800px;margin:0 auto;padding:120px 20px 80px;}
.bp-back{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:32px;display:inline-flex;align-items:center;gap:8px;transition:gap .2s;}.bp-back:hover{gap:12px;}
.bp-header{display:flex;gap:28px;align-items:center;margin-bottom:40px;padding-bottom:32px;border-bottom:1px solid var(--brs);}
.bp-av{width:110px;height:110px;border-radius:50%;overflow:hidden;border:3px solid var(--br);flex-shrink:0;}.bp-av img{width:100%;height:100%;object-fit:cover;}
.bp-info{}
.bp-name{font-family:var(--fh);font-size:2rem;font-weight:400;margin-bottom:4px;}
.bp-role{font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gd);font-weight:700;margin-bottom:8px;}
.bp-loc{font-size:.76rem;color:var(--txm);font-weight:300;}
.bp-bio{font-size:.86rem;color:var(--txm);line-height:1.8;font-weight:300;margin-bottom:40px;}
.bp-se{font-size:.48rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;font-weight:700;}
.bp-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:48px;}
@media(max-width:600px){.bp-gallery{grid-template-columns:repeat(2,1fr);}}
.bp-gal-item{aspect-ratio:1;overflow:hidden;border:1px solid var(--brs);}.bp-gal-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}.bp-gal-item:hover img{transform:scale(1.05);}
.bp-cta{text-align:center;padding:40px 0;border-top:1px solid var(--brs);}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;font-family:var(--fb);font-size:.6rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;border:none;cursor:pointer;transition:all .3s;background:var(--gold);color:var(--bg);}.btn:hover{background:var(--gl);transform:translateY(-2px);}
footer{background:var(--bg);border-top:1px solid var(--brs);padding:36px 48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;}
.fl img{height:24px;opacity:.6;}.fc{font-size:.54rem;color:var(--txs);letter-spacing:.1em;}
.fs{display:flex;gap:20px;}.fs a{font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--txm);font-weight:600;transition:color .25s;}.fs a:hover{color:var(--gold);}
@media(max-width:768px){footer{padding:24px 20px;flex-direction:column;text-align:center;}.bp-header{flex-direction:column;text-align:center;}}

/* ═══ PAGE TRANSITION — CINEMATIC WIPE ═══ */
#pt-overlay{position:fixed;inset:0;z-index:99999;pointer-events:all;overflow:hidden;}
#pt-overlay.pt-out{pointer-events:none;}
.pt-top,.pt-bot{position:absolute;left:0;right:0;height:50%;background:#060606;transition:transform .7s cubic-bezier(.77,0,.175,1);z-index:1;}
.pt-top{top:0;transform:translateY(0);}
.pt-bot{bottom:0;transform:translateY(0);}
#pt-overlay.pt-out .pt-top{transform:translateY(-102%);}
#pt-overlay.pt-out .pt-bot{transform:translateY(102%);}



.pt-logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0;z-index:4;transition:opacity .3s .15s;}
#pt-overlay.pt-anim .pt-logo{opacity:1;}
#pt-overlay.pt-out .pt-logo{opacity:0;transition:opacity .25s;}
.pt-logo img{height:36px;opacity:.9;}
</style>

<script>
(function(){
  var ov=document.getElementById('pt-overlay');
  if(!ov)return;
  function navigateTo(url){
    ov.classList.remove('pt-out','pt-anim');void ov.offsetWidth;
    setTimeout(function(){ov.classList.add('pt-anim');},50);
    setTimeout(function(){window.location.href=url;},800);
  }
  var _done=false;
  function pageIn(){
    if(_done)return;_done=true;
    if(!window.location.hash)window.scrollTo(0,0);
    ov.classList.remove('pt-out');ov.classList.add('pt-anim');
    setTimeout(function(){ov.classList.add('pt-out');},600);
  }
  document.querySelectorAll('a[href]:not([href^="http"]):not([href^="#"]):not([href^="mailto"]):not([href^="tel"]):not([href^="https://wa"])').forEach(function(a){
    a.addEventListener('click',function(e){
      var href=a.getAttribute('href');if(!href||href==='#')return;
      var cur=location.pathname.split('/').pop()||'index.html';
      var base=href.split('#')[0].split('?')[0];
      if(href.indexOf('#')!==-1&&(base===cur||base==='')){
        e.preventDefault();var t=document.querySelector('#'+href.split('#')[1]);
        if(t)t.scrollIntoView({behavior:'smooth'});return;
      }
      if(base===cur||base===''){
        e.preventDefault();
        ov.classList.remove('pt-out','pt-anim');void ov.offsetWidth;
        setTimeout(function(){ov.classList.add('pt-anim');},50);
        setTimeout(function(){window.scrollTo(0,0);setTimeout(function(){ov.classList.add('pt-out');},400);},600);
        return;
      }
      e.preventDefault();navigateTo(href);
    });
  });
  window._ptNav=navigateTo;
  window.addEventListener('pageshow',function(){_done=false;pageIn();});
  if(document.readyState==='complete')pageIn();else window.addEventListener('load',pageIn);
  setTimeout(function(){ov.classList.add('pt-anim');setTimeout(function(){ov.classList.add('pt-out');},500);},1500);
})();
</script>
